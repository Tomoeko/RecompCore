name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  nogui-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: brew install ninja
      - name: Configure
        run: cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DENABLE_QT=OFF -DENABLE_NOGUI=ON -DUSE_MGBA=OFF
      - name: Build
        run: ninja -C build dolphin-emu-nogui

  nogui-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build build-essential pkg-config \
            libevdev-dev libudev-dev libgtk-3-dev libsystemd-dev \
            libbluetooth-dev libasound2-dev libpulse-dev libgl1-mesa-dev \
            libxrandr-dev libxi-dev
      - name: Configure
        run: cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DENABLE_QT=OFF -DENABLE_NOGUI=ON -DUSE_MGBA=OFF
      - name: Build
        run: ninja -C build dolphin-emu-nogui
