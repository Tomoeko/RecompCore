name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A full build needs game-derived generated/ code, so CI is lint-only.
jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: shellcheck bootstrap.sh tools/package_module.sh
      - name: Python syntax
        run: python3 -m py_compile tools/*.py chassis-module/*.py
